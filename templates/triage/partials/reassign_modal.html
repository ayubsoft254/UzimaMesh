<div class="fixed inset-0 flex items-center justify-center bg-black/60 z-50">

<div class="bg-gray-900 rounded-xl p-6 w-[400px] border border-white/10">

<h3 class="text-lg font-semibold text-white mb-4">
Reassign Case
</h3>

<form
hx-post="/doctor/reassign/{{ session.id }}/confirm/"
hx-target="#queue-body"
hx-swap="innerHTML"
>

{% csrf_token %}

<select
name="doctor"
class="w-full px-3 py-2 rounded-lg bg-gray-800 text-white border border-white/10"
>

{% for doctor in doctors %}
<option value="{{ doctor.id }}">
Dr. {{ doctor.user.first_name }} {{ doctor.user.last_name }}
</option>
{% endfor %}

</select>

<div class="flex justify-end gap-2 mt-6">

<button
type="button"
onclick="document.getElementById('modal').innerHTML=''"
class="px-4 py-2 text-gray-300"
>
Cancel
</button>

<button
type="submit"
class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-white"
>
Reassign
</button>

</div>

</form>

</div>

</div>
