<div id="doctor-availability">

<div class="flex justify-end">

<div class="glass px-6 py-3 rounded-xl flex items-center space-x-4">

<span class="text-[9px] uppercase tracking-widest text-neutral-400 font-bold">
Doctor Availability
</span>

<label class="relative inline-flex items-center cursor-pointer">

<input
type="checkbox"
class="sr-only peer"
hx-post="/doctor/toggle-availability/"
hx-target="#doctor-availability"
hx-swap="outerHTML"
hx-trigger="change"
{% if doctor.is_available %}checked{% endif %}
>

<div class="w-10 h-5 bg-neutral-700 rounded-full peer-checked:bg-green-500 transition"></div>

<div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full
peer-checked:translate-x-5 transition"></div>

</label>

<span class="text-[9px] font-bold uppercase tracking-widest
{% if doctor.is_available %}text-green-400{% else %}text-neutral-500{% endif %}">

{% if doctor.is_available %}
Online
{% else %}
Offline
{% endif %}

</span>

</div>

</div>

</div>
